<div class="grx26-panel" id="grx26-forge-map-root">
  <h2>Forge Map — Registry</h2>
  <div id="grx26-forge-map-container"></div>
</div>
<script>
(function() {
  function render() {
    if (typeof GRX26 === 'undefined' || !GRX26.ForgeMap || !GRX26.ForgeMap.renderInto) return;
    var container = document.getElementById('grx26-forge-map-container');
    if (container) GRX26.ForgeMap.renderInto(container);
  }
  setTimeout(render, 100);
})();
</script>
