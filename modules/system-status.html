<div class="grx26-panel" id="grx26-system-status-root">
  <h2>System Status</h2>
  <p id="grx26-status-build">—</p>
  <p id="grx26-status-missing">—</p>
  <p id="grx26-status-forge">—</p>
  <button type="button" id="grx26-btn-selftest">Run Self-Test</button>
  <div id="grx26-selftest-result"></div>
  <h2 style="margin-top:20px;">Request via Core</h2>
  <p style="font-size:12px;color:var(--grx26-text-muted,#9ca3af);">User → Core → Sentinel → (Titan if needed) → Core → User.</p>
  <input type="text" id="grx26-request-input" placeholder="e.g. Run a self-system test and report ecosystem." style="width:100%;max-width:400px;padding:8px;margin:8px 0;background:var(--grx26-surface);border:1px solid var(--grx26-border);color:var(--grx26-text);">
  <button type="button" id="grx26-btn-submit">Submit via Core</button>
  <pre id="grx26-request-result" style="margin-top:12px;font-size:11px;white-space:pre-wrap;background:rgba(0,0,0,0.2);padding:12px;border-radius:4px;"></pre>
  <h2 style="margin-top:24px;">Audit (recent 20)</h2>
  <p style="font-size:12px;color:var(--grx26-text-muted,#9ca3af);">Operator view: request_received, sentinel_processed, titan_invoked, response_sent.</p>
  <table class="grx26-audit-table" style="margin-top:8px;"><thead><tr><th>Time</th><th>Event</th><th>Trace ID</th></tr></thead><tbody id="grx26-status-audit-tbody"></tbody></table>
</div>
<script>
(function() {
  function refresh() {
    if (typeof CoreOrchestrator === 'undefined' || !CoreOrchestrator.getSystemStatus) return;
    var s = CoreOrchestrator.getSystemStatus();
    var el = document.getElementById('grx26-status-build');
    if (el) el.textContent = 'Build: ' + (s.buildFlavor || '—');
    el = document.getElementById('grx26-status-missing');
    if (el) el.textContent = 'Missing: ' + (s.missingModules && s.missingModules.length ? s.missingModules.join(', ') : 'None');
    el = document.getElementById('grx26-status-forge');
    if (el) el.textContent = 'Forge nodes: Governance ' + (s.forgeNodes && s.forgeNodes.governance) + ', Analysis ' + (s.forgeNodes && s.forgeNodes.analysis) + ', Ops ' + (s.forgeNodes && s.forgeNodes.ops);
  }
  var btn = document.getElementById('grx26-btn-selftest');
  var resultEl = document.getElementById('grx26-selftest-result');
  if (btn && resultEl) {
    btn.addEventListener('click', function() {
      if (typeof CoreOrchestrator === 'undefined' || !CoreOrchestrator.runSelfTest') return;
      var report = CoreOrchestrator.runSelfTest();
      var html = '<p class="grx26-self-test-result ' + (report.pass ? 'pass' : 'fail') + '">' + (report.pass ? 'PASS' : 'FAIL') + '</p><ul style="margin-top:8px;font-size:12px;">';
      (report.checks || []).forEach(function(c) {
        html += '<li>' + (c.pass ? '✓' : '✗') + ' ' + (c.name || '') + (c.detail ? ' (' + c.detail + ')' : '') + '</li>';
      });
      resultEl.innerHTML = html + '</ul>';
    });
  }
  var submitBtn = document.getElementById('grx26-btn-submit');
  var inputEl = document.getElementById('grx26-request-input');
  var resultPre = document.getElementById('grx26-request-result');
  if (submitBtn && inputEl && resultPre) {
    submitBtn.addEventListener('click', function() {
      if (typeof CoreOrchestrator === 'undefined' || !CoreOrchestrator.handleUserRequest) return;
      var text = (inputEl.value || '').trim() || 'Run a self-system test and report ecosystem.';
      var out = CoreOrchestrator.handleUserRequest(text, {});
      resultPre.textContent = 'traceId: ' + (out.traceId || '') + '\nconfidence: ' + (out.confidence || '') + '\nresult: ' + JSON.stringify(out.result || {}, null, 2) + (out.titanOutput ? '\ntitanReason: ' + (out.notices && out.notices[0]) : '');
    });
  }
  function refreshAudit() {
    if (typeof Audit === 'undefined' || !Audit.getRecent) return;
    var entries = Audit.getRecent(20);
    var tbody = document.getElementById('grx26-status-audit-tbody');
    if (!tbody) return;
    if (!entries.length) { tbody.innerHTML = '<tr><td colspan="3">No entries.</td></tr>'; return; }
    tbody.innerHTML = entries.map(function(e) {
      return '<tr><td>' + (e.ts ? new Date(e.ts).toLocaleTimeString() : '') + '</td><td>' + (e.eventType || '') + '</td><td>' + (e.traceId || '') + '</td></tr>';
    }).join('');
  }
  setTimeout(refresh, 100);
  setTimeout(refreshAudit, 150);
})();
</script>
